# Server
server.port=${PORT:8080}

# Database - PostgreSQL (production) / H2 (local)
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/urlshortener}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JPA/Hibernate
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 Console (only local)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# CORS
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000}

# Logging
logging.level.org.hibernate.url_shortener_backend=INFO