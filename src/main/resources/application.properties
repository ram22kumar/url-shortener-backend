# Server
server.port=${PORT:8080}

# Database (handled by DatabaseConfig.java)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis (handled by RedisConfig.java)
# REDIS_URL environment variable is parsed in RedisConfig

# CORS
spring.web.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# Logging
logging.level.org.hibernate.url_shortener_backend=INFO